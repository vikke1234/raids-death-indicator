plugins {
	id 'java'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'

	testImplementation 'junit:junit:4.12'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'com.example'
version = '1.0-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(11)
		vendor = JvmVendorSpec.JETBRAINS
	}
}

tasks.withType(JavaCompile) {
	options.encoding = 'UTF-8'
}

task runClient(type: JavaExec) {
	mainClass = 'com.example.ExamplePluginTest'
	classpath = sourceSets.test.runtimeClasspath
	jvmArgs '-ea'
	jvmArgs '-XX:+AllowEnhancedClassRedefinition'
	jvmArgs "-javaagent:${rootProject.file('tools/hotswap-agent.jar')}"
	// Let HotSwapAgent's JdkPlugin flush the java.beans cache after a reload (silences module-access errors).
	jvmArgs '--add-opens', 'java.desktop/com.sun.beans.introspect=ALL-UNNAMED'
	args '--developer-mode'
	javaLauncher = javaToolchains.launcherFor(java.toolchain)
}
